spring.application.name=tramites
 
# Base de datos PostgreSQL - Supabase
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
 
# Puerto (Render inyecta PORT; localmente usa 8080)
server.port=${PORT:8080}
 
# HikariCP — limitar conexiones para Supabase Session mode (free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
 
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data.sql
 
# CORS — origen permitido (frontend)
cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}
 
# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
 
# Supabase Storage
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_BUCKET:tramites-documentos}
 
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=60MB
 
# Configuración de correo (MailHog en localhost para desarrollo)
# Para activar envío real: apunta a tu SMTP y completa usuario/contraseña
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kevindavidav@ufps.edu.co
spring.mail.password=jcro qiou zyob bgzb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
 
spring.profiles.active=local

# URL pública del backend (usada en los QR de los PDFs)
# En producción: APP_BACKEND_URL=https://tramites-backend.onrender.com
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}

# Par RSA para firma digital de PDFs
# Dejar vacío en desarrollo (se genera en memoria y se imprime en el log).
# En producción: copiar los valores base64 del log la primera vez y setear en Render:
#   APP_FIRMA_CLAVE_PRIVADA=<base64-pkcs8>
#   APP_FIRMA_CLAVE_PUBLICA=<base64-x509>
app.firma.clave-privada=${APP_FIRMA_CLAVE_PRIVADA:}
app.firma.clave-publica=${APP_FIRMA_CLAVE_PUBLICA:}
