spring.application.name=tramites

# Base de datos H2
spring.datasource.url=jdbc:h2:mem:tramitesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS para React
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.same-site=lax

# Configuración de correo (MailHog en localhost para desarrollo)
# Para activar envío real: apunta a tu SMTP y completa usuario/contraseña
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
