spring.application.name=tramites

# Base de datos PostgreSQL - Supabase
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres.loozpwmomrfeujdzcqur
spring.datasource.password=Tposgrados2026

# Puerto (Render inyecta PORT; localmente usa 8080)
server.port=${PORT:8080}

# HikariCP — limitar conexiones para Supabase Session mode (free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data.sql

# CORS — origen permitido (frontend)
cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Almacenamiento local de documentos subidos
app.uploads.directorio=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuración de correo (MailHog en localhost para desarrollo)
# Para activar envío real: apunta a tu SMTP y completa usuario/contraseña
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
